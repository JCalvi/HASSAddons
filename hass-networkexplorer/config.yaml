name: Network Explorer
version: 2026.6.23
slug: networkexplorer
description: Live network inventory for Pi-hole and OpenWrt networks
url: https://github.com/JCalvi/HASSAddons
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8090
panel_icon: mdi:lan
panel_title: Network
homeassistant_api: false
host_network: true
map:
  - config:rw
  - share:rw
  - ssl:ro
options:
  ping_workers: 50
  ping_timeout: 1
  tcp_probe: false
  tcp_ports:
    - 22
    - 53
    - 80
    - 443
  steering_enabled: true
  steering_interval_minutes: 60
  steering_cooldown_minutes: 180
  mqtt_enabled: false
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic_prefix: network_explorer
schema:
  ping_workers: int(1,200)
  ping_timeout: int(1,10)
  tcp_probe: bool
  tcp_ports:
    - int(1,65535)
  steering_enabled: bool
  steering_interval_minutes: int(1,1440)
  steering_cooldown_minutes: int(1,1440)
  mqtt_enabled: bool
  mqtt_host: str?
  mqtt_port: int(1,65535)
  mqtt_username: str?
  mqtt_password: password?
  mqtt_topic_prefix: str
