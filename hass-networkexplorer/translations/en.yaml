configuration:
  ping_workers:
    name: Ping workers
    description: >-
      The number of concurrent pings to send at once during each refresh.
      Higher values complete scans faster, but briefly use more CPU and
      network bandwidth. Default: 50.
  ping_timeout:
    name: Ping timeout
    description: >-
      The time in seconds to wait for each ping response before treating that
      ping as failed. Default: 1.
  tcp_probe:
    name: TCP probe
    description: >-
      Also checks common TCP ports when a device does not respond to ping.
      This can detect devices that block ICMP ping but still have services
      open, such as SSH, HTTP, HTTPS or DNS. It may make refreshes slightly
      slower.
  tcp_ports:
    name: TCP ports
    description: >-
      TCP ports to test when TCP probe is enabled. Common examples are 22 for
      SSH, 53 for DNS, 80 for HTTP and 443 for HTTPS.
  steering_enabled:
    name: Automatic Preferred AP steering
    description: >-
      When enabled, Network Explorer checks live Wi-Fi clients on the
      configured interval and disconnects clients that are connected to the
      wrong AP so they can reconnect to their preferred AP. Manual Move Now
      buttons still work when this is off.
  steering_interval_minutes:
    name: Steering interval minutes
    description: >-
      The time in minutes between automatic Preferred AP steering checks. This
      only applies when Automatic Preferred AP steering is enabled. Default:
      60.
  steering_cooldown_minutes:
    name: Steering cooldown minutes
    description: >-
      The minimum time in minutes before the same device can be automatically
      steered again. This prevents repeated disconnect/reconnect loops.
      Default: 180.
  mqtt_enabled:
    name: MQTT command listener
    description: >-
      Enables the MQTT command listener. When enabled, Network Explorer
      subscribes to the configured command topic and can receive commands such
      as Preferred AP steering requests.
  mqtt_host:
    name: MQTT broker host
    description: >-
      MQTT broker hostname or IP address. Leave blank to disable MQTT, even if
      MQTT command listener is enabled.
  mqtt_port:
    name: MQTT broker port
    description: >-
      MQTT broker port. Default: 1883.
  mqtt_username:
    name: MQTT username
    description: >-
      Optional MQTT username.
  mqtt_password:
    name: MQTT password
    description: >-
      Optional MQTT password. Stored in Home Assistant add-on options like
      other add-on secrets.
  mqtt_topic_prefix:
    name: MQTT topic prefix
    description: >-
      MQTT topic prefix used by Network Explorer. Commands are received on
      <prefix>/command/#. Default: network_explorer.
