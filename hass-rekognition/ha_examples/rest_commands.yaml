# rest_command entries for the Rekognition Bridge add-on
#
# Add these to your configuration.yaml under the `rest_command:` key,
# or in a dedicated file included via:
#   rest_command: !include rest_commands.yaml
#
# Replace <ADDON_IP> with the IP/hostname where the add-on is running
# (typically the host running HAOS, e.g. homeassistant.local or 192.168.1.x).
# Port 8080 is the default exposed by the add-on.

rest_command:
  rekognition_match_person:
    url: "http://homeassistant.local:8080/match"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: >
      {
        "snapshot_path": "{{ snapshot_path }}",
        "threshold": {{ threshold | default(95) }},
        "max_faces": {{ max_faces | default(1) }}
      }
    content_type: "application/json"

  rekognition_match_doorbell:
    url: "http://homeassistant.local:8080/match"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: >
      {
        "snapshot_path": "{{ snapshot_path }}",
        "threshold": {{ threshold | default(95) }},
        "max_faces": {{ max_faces | default(1) }}
      }
    content_type: "application/json"
