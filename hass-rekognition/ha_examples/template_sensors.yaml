# Template Sensors derived from the Rekognition Bridge helpers
#
# Add these inside a `template:` block in your configuration.yaml,
# or in a dedicated template sensor file included via the `template:` key.
#
# Example configuration.yaml snippet:
#   template: !include template_sensors.yaml
#
# ── Person detected (all snapshot types) ────────────────────────────────────
template:
  - sensor:
      - name: "Rekognition - Person"
        unique_id: rekognition_person
        state: >
          {% set status = states('input_text.rekognition_person_status') %}
          {% if status == 'searching' %} Identifying...
          {% elif status == 'matched' %} {{ states('input_text.rekognition_person_name') }}
          {% elif status == 'no_match' %} Unknown Person
          {% elif status == 'no_face' %} No Face Detected
          {% else %} Waiting {% endif %}
        attributes:
          status: "{{ states('input_text.rekognition_person_status') }}"
          name: "{{ states('input_text.rekognition_person_name') }}"
          similarity: "{{ states('input_number.rekognition_person_similarity') | float(0) }}"
          icon: >
            {% set status = states('input_text.rekognition_person_status') %}
            {% if status == 'searching' %} mdi:account-search
            {% elif status == 'matched' %} mdi:account-check
            {% elif status == 'no_match' %} mdi:account-question
            {% else %} mdi:account-off {% endif %}
